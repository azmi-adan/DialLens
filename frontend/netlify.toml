[build]
  command = "echo 'Static site - no build needed'"
  publish = "."

[[redirects]]
  from = "/"
  to = "/templates/index.html"
  status = 200

[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

# Proxy to Render backend
[[redirects]]
  from = "/scan"
  to = "https://diallens-backend.onrender.com/scan"
  status = 200
  force = true