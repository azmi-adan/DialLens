services:
  - type: web
    name: diallens-backend
    runtime: python
    repo: https://github.com/azmi-adan/DialLens
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13